<svg width="320" height="120" viewBox="0 0 320 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradiente roxo mais moderno -->
    <linearGradient id="roxoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0aaff"/>
      <stop offset="50%" stop-color="#9d4edd"/>
      <stop offset="100%" stop-color="#5a189a"/>
    </linearGradient>

    <!-- Sombra suave -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>

    <!-- Brilho leve -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <text x="50%" y="55%"
        text-anchor="middle"
        dominant-baseline="middle"
        font-family="Pacifico, Great Vibes, cursive"
        font-size="64"
        fill="url(#roxoGrad)"
        filter="url(#shadow)">
        
    <tspan filter="url(#glow)">Baby Modas</tspan>
  </text>
</svg>